name: Production Monitoring

on:
  workflow_dispatch:
  schedule:
    # GitHub cron runs in UTC. We trigger both hours and gate at runtime
    # so the test runs once at 05:00 in Asia/Nicosia across DST changes.
    - cron: "0 2 * * *"
    - cron: "0 3 * * *"

permissions:
  contents: read
  issues: write

jobs:
  prod-registration-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute Cyprus hour
        id: cyprus
        shell: bash
        run: |
          echo "hour=$(TZ=Asia/Nicosia date +%H)" >> "$GITHUB_OUTPUT"
          echo "now=$(TZ=Asia/Nicosia date '+%Y-%m-%d %H:%M:%S %Z')" >> "$GITHUB_OUTPUT"

      - name: Skip outside 05:00 Cyprus window
        if: github.event_name == 'schedule' && steps.cyprus.outputs.hour != '05'
        shell: bash
        run: |
          echo "Skipping. Cyprus local time is ${{ steps.cyprus.outputs.now }}."

      - name: Setup Node
        if: github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.hour == '05'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.hour == '05'
        run: npm ci

      - name: Install Playwright browsers
        if: github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.hour == '05'
        run: npx playwright install --with-deps chromium

      - name: Run production doctor registration smoke
        if: github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.hour == '05'
        env:
          PLAYWRIGHT_LIVE_REGISTRATION: "1"
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL_PROD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx playwright test tests/prod_registration_smoke.spec.ts --project="Desktop Large (Chromium)" --reporter=line

      - name: Upload Playwright report
        if: always() && (github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.hour == '05')
        uses: actions/upload-artifact@v4
        with:
          name: playwright-prod-monitoring-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Send webhook alert on failure
        if: failure() && (github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.hour == '05')
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.PROD_SMOKE_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            echo "No PROD_SMOKE_ALERT_WEBHOOK_URL configured. Skipping webhook alert."
            exit 0
          fi
          payload=$(cat <<'JSON'
          {
            "text": "DocCy prod registration smoke FAILED. Check GitHub Actions run details."
          }
          JSON
          )
          curl -X POST -H "Content-Type: application/json" -d "$payload" "$WEBHOOK_URL"

      - name: Create GitHub issue alert on failure
        if: failure() && (github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.hour == '05')
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Prod smoke failed: doctor registration (${new Date().toISOString().slice(0,10)})`;
            const body = [
              "Production smoke test failed for Doctor Registration.",
              "",
              `- Workflow: ${context.workflow}`,
              `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- Trigger: ${context.eventName}`,
              `- Cyprus time at start: ${{ steps.cyprus.outputs.now }}`
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["prod-monitoring", "incident"]
            });

