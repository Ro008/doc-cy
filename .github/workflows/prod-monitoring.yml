name: Production Monitoring

on:
  workflow_dispatch:
  schedule:
    # GitHub cron runs in UTC. We trigger both hours and gate at runtime
    # so the test runs once at 05:00 in Asia/Nicosia across DST changes.
    - cron: "0 2 * * *"
    - cron: "0 3 * * *"

permissions:
  contents: read
  issues: write

jobs:
  prod-critical-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute Cyprus hour
        id: cyprus
        shell: bash
        run: |
          echo "hour=$(TZ=Asia/Nicosia date +%H)" >> "$GITHUB_OUTPUT"
          echo "now=$(TZ=Asia/Nicosia date '+%Y-%m-%d %H:%M:%S %Z')" >> "$GITHUB_OUTPUT"

      - name: Skip outside 05:00 Cyprus window
        if: github.event_name == 'schedule' && steps.cyprus.outputs.hour != '05'
        shell: bash
        run: |
          echo "Skipping. Cyprus local time is ${{ steps.cyprus.outputs.now }}."

      - name: Setup Node
        if: github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.hour == '05'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.hour == '05'
        run: npm ci

      - name: Install Playwright browsers
        if: github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.hour == '05'
        run: npx playwright install --with-deps chromium

      - name: Run production critical smoke suite
        if: github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.hour == '05'
        env:
          PLAYWRIGHT_LIVE_REGISTRATION: "1"
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL_PROD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_DOCTOR_EMAIL: ${{ secrets.TEST_DOCTOR_EMAIL }}
          TEST_DOCTOR_PASSWORD: ${{ secrets.TEST_DOCTOR_PASSWORD }}
          TEST_BOOKING_DOCTOR_SLUG: ${{ secrets.TEST_BOOKING_DOCTOR_SLUG }}
        run: npx playwright test tests/prod/ --project="Desktop Large (Chromium)" --reporter=line

      - name: Upload Playwright report
        if: always() && (github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.hour == '05')
        uses: actions/upload-artifact@v4
        with:
          name: playwright-prod-monitoring-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Send WhatsApp monitoring status
        if: always() && (github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.hour == '05')
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.WHATSAPP_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            echo "No WHATSAPP_WEBHOOK_URL configured. Skipping WhatsApp notification."
            exit 0
          fi
          WEBHOOK_URL="$(echo -n "${WEBHOOK_URL}" | tr -d '\r\n')"
          if [ "${JOB_STATUS}" = "success" ]; then
            MSG='✅ DocCy PROD: Success'
          else
            MSG='❌ DocCy PROD: Failure'
          fi
          ENCODED_MSG=$(python -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$MSG")
          # WHATSAPP_WEBHOOK_URL secret must contain the base URL ending with '&text='.
          FINAL_URL="${WEBHOOK_URL}${ENCODED_MSG}"
          curl -fsS -G "${FINAL_URL}"

