# Nightly prod browser smoke: tests/prod/*
# Covers: public shell (home, login, register), guest booking + cleanup, doctor login → agenda,
# optional full registration when PLAYWRIGHT_LIVE_REGISTRATION=1.
# Not covered here (local / integration only): agenda cancel flows, confirm/decline REQUESTED,
# reschedule token pages, race-condition DB test (see pr-integration.yml).

name: Production Monitoring

on:
  workflow_dispatch:
    inputs:
      notify_only:
        description: "Send only WhatsApp notification (skip smoke tests)"
        required: false
        default: false
        type: boolean
      notification_message:
        description: "Optional extra text appended to WhatsApp message"
        required: false
        default: ""
        type: string
  schedule:
    # GitHub Actions cron is UTC. Run 2h earlier than before.
    # 01:00 UTC ≈ 03:00 Asia/Nicosia (EET, UTC+2).
    - cron: "0 1 * * *"

permissions:
  contents: read
  issues: write

jobs:
  prod-critical-smoke:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.notify_only != 'true' }}
    runs-on: ubuntu-latest
    # Cold runs: npm ci + playwright --with-deps (apt + fonts) + prod suite can exceed 30m.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        # --with-deps runs apt (fonts, libs). First run often takes several minutes; this is normal.
        run: npx playwright install --with-deps chromium

      - name: Validate Supabase production secrets
        shell: bash
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
          PROD_NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL }}
          INTEGRATION_SUPABASE_URL: ${{ secrets.INTEGRATION_SUPABASE_URL }}
        run: |
          set -euo pipefail
          missing=0

          if [ -z "${NEXT_PUBLIC_SUPABASE_URL}" ]; then
            echo "::error::Missing GitHub secret PROD_NEXT_PUBLIC_SUPABASE_URL."
            missing=1
          fi
          if [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ]; then
            echo "::error::Missing GitHub secret PROD_NEXT_PUBLIC_SUPABASE_ANON_KEY."
            missing=1
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "::error::Missing GitHub secret PROD_SUPABASE_SERVICE_ROLE_KEY."
            missing=1
          fi

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          normalize_url() { echo "$1" | sed 's:/*$::'; }
          prod_norm="$(normalize_url "${NEXT_PUBLIC_SUPABASE_URL}")"
          expected_prod_norm="$(normalize_url "${PROD_NEXT_PUBLIC_SUPABASE_URL:-}")"
          integration_norm="$(normalize_url "${INTEGRATION_SUPABASE_URL:-}")"

          # If an explicit production URL secret is configured, force exact match.
          if [ -n "${expected_prod_norm}" ] && [ "${prod_norm}" != "${expected_prod_norm}" ]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_URL does not match PROD_NEXT_PUBLIC_SUPABASE_URL. Refusing to run prod monitoring against a non-prod Supabase project."
            exit 1
          fi

          # Guardrail: never run prod monitoring against integration/testing Supabase.
          if [ -n "${integration_norm}" ] && [ "${prod_norm}" = "${integration_norm}" ]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_URL matches INTEGRATION_SUPABASE_URL. Refusing to run prod monitoring against integration/testing Supabase."
            exit 1
          fi

      - name: Run reschedule email guards
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
          DOC_CY_SUPPRESS_TRAFFIC_LOG_SECRET: ${{ secrets.DOC_CY_SUPPRESS_TRAFFIC_LOG_SECRET }}
        run: |
          npx playwright test \
            tests/integration/agenda_multisession_sync.integration.spec.ts \
            tests/integration/trial_period_logic.integration.spec.ts \
            tests/integration/agenda_visit_reason.integration.spec.ts \
            tests/integration/reschedule_email_content.integration.spec.ts \
            --project="Desktop Large (Chromium)" \
            --workers=1 \
            --reporter=line

      - name: Validate production base URL target
        shell: bash
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL_PROD }}
          PROD_SITE_URL: ${{ secrets.PROD_SITE_URL || secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          set -euo pipefail

          normalize_url() { echo "$1" | sed 's:/*$::'; }
          normalize_host() { echo "$1" | sed -E 's/^www\.//'; }

          if [ -z "${PLAYWRIGHT_BASE_URL:-}" ]; then
            echo "::error::Missing GitHub secret PLAYWRIGHT_BASE_URL_PROD."
            exit 1
          fi

          base_norm="$(normalize_url "${PLAYWRIGHT_BASE_URL}")"
          expected_site="${PROD_SITE_URL:-https://www.mydoccy.com}"
          expected_norm="$(normalize_url "${expected_site}")"

          base_host_raw="$(echo "${base_norm}" | sed -E 's#^https?://([^/:]+).*#\1#')"
          expected_host_raw="$(echo "${expected_norm}" | sed -E 's#^https?://([^/:]+).*#\1#')"
          base_host="$(normalize_host "${base_host_raw}")"
          expected_host="$(normalize_host "${expected_host_raw}")"

          if [ "${base_host}" != "${expected_host}" ]; then
            echo "::error::PLAYWRIGHT_BASE_URL_PROD host (${base_host_raw}) does not match production host (${expected_host_raw}) after normalization."
            echo "::error::Set PLAYWRIGHT_BASE_URL_PROD to the same production site you use manually."
            exit 1
          fi

          case "${base_host}" in
            *vercel.app)
              echo "::error::PLAYWRIGHT_BASE_URL_PROD points to a vercel.app host (${base_host}). Use the canonical production domain instead."
              exit 1
              ;;
          esac

      # Nightly critical contract (blocking):
      # - Public shell availability
      # - Patient booking request + cleanup
      # - Doctor registration + cleanup
      # - Doctor agenda + QR access using deterministic authenticated session
      - name: Run production critical smoke suite (blocking)
        env:
          PLAYWRIGHT_LIVE_REGISTRATION: "1"
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL_PROD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
          DOC_CY_SUPPRESS_TRAFFIC_LOG_SECRET: ${{ secrets.DOC_CY_SUPPRESS_TRAFFIC_LOG_SECRET }}
          TEST_DOCTOR_EMAIL: ${{ secrets.TEST_DOCTOR_EMAIL }}
          TEST_DOCTOR_PASSWORD: ${{ secrets.TEST_DOCTOR_PASSWORD }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || secrets.TEST_DOCTOR_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || secrets.TEST_DOCTOR_PASSWORD }}
          TEST_BOOKING_DOCTOR_SLUG: ${{ secrets.TEST_BOOKING_DOCTOR_SLUG }}
        run: |
          npx playwright test \
            tests/prod/prod_appointment_booking_flow.spec.ts \
            tests/prod/prod_registration_smoke.spec.ts \
            tests/prod/prod_site_availability.spec.ts \
            tests/prod/prod_doctor_password_login_smoke.spec.ts \
            tests/prod/prod_agenda_qr_with_session.spec.ts \
            --project="Desktop Large (Chromium)" \
            --workers=1 \
            --reporter=line

      # Secondary monitor (non-blocking): keeps visibility on UI password login volatility
      # without weakening the blocking critical contract above.
      - name: Run doctor password login UI monitor (non-blocking)
        continue-on-error: true
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL_PROD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
          DOC_CY_SUPPRESS_TRAFFIC_LOG_SECRET: ${{ secrets.DOC_CY_SUPPRESS_TRAFFIC_LOG_SECRET }}
          TEST_DOCTOR_EMAIL: ${{ secrets.TEST_DOCTOR_EMAIL }}
          TEST_DOCTOR_PASSWORD: ${{ secrets.TEST_DOCTOR_PASSWORD }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || secrets.TEST_DOCTOR_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || secrets.TEST_DOCTOR_PASSWORD }}
        run: |
          npx playwright test \
            tests/prod/prod_doctor_password_login_ui_monitor.spec.ts \
            --project="Desktop Large (Chromium)" \
            --workers=1 \
            --reporter=line

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-prod-monitoring-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  business-critical-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_WEB_SERVER_COMMAND: npm run start
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.INTEGRATION_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.INTEGRATION_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.INTEGRATION_SUPABASE_SERVICE_ROLE_KEY }}
      INTERNAL_DIRECTORY_SECRET: ${{ secrets.INTERNAL_DIRECTORY_SECRET }}
      PROD_NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL }}
      INTEGRATION_SAFE_ENV: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required integration secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for v in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Missing required secret/env: ${v}"
              missing=1
            fi
          done
          if [ -z "${INTERNAL_DIRECTORY_SECRET:-}" ]; then
            echo "::warning::INTERNAL_DIRECTORY_SECRET is missing. Internal duplicate-actions integration test will be skipped."
          fi
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (integration local server)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.INTEGRATION_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.INTEGRATION_SUPABASE_ANON_KEY }}
          DOC_CY_SUPPRESS_TRAFFIC_LOG_SECRET: ${{ secrets.DOC_CY_SUPPRESS_TRAFFIC_LOG_SECRET }}
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run business-critical integration tests
        run: |
          npx playwright test \
            tests/integration/finder_critical.integration.spec.ts \
            tests/integration/settings_clinic_address_notice.integration.spec.ts \
            tests/navigation.spec.ts \
            tests/integration/directory_duplicates_actions.integration.spec.ts \
            --project="Desktop Large (Chromium)" \
            --workers=1 \
            --reporter=line

      - name: Upload Playwright integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-business-critical-integration-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  business-critical-integration-failure-issue:
    if: always()
    needs: [business-critical-integration]
    runs-on: ubuntu-latest
    steps:
      - name: Open issue on integration failure
        if: needs.business-critical-integration.result != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[business-critical] Integration checks failed (run ${context.runId})`;
            const body = [
              "Business-critical integration monitoring failed.",
              "",
              `Result: **${{ needs.business-critical-integration.result }}**`,
              `Run: ${runUrl}`,
              "",
              "Failed suite includes:",
              "- finder_critical.integration.spec.ts",
              "- settings_clinic_address_notice.integration.spec.ts",
              "- directory_duplicates_actions.integration.spec.ts",
              "",
              "Action:",
              "- Open the run and inspect Playwright artifacts.",
              "- Fix regression before next scheduled run."
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["ci", "monitoring", "business-critical"]
            });

  notify-whatsapp:
    if: always()
    needs: [prod-critical-smoke, business-critical-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Send WhatsApp monitoring status (retries)
        id: whatsapp
        continue-on-error: true
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.WHATSAPP_WEBHOOK_URL }}
          PROD_RESULT: ${{ needs.prod-critical-smoke.result }}
          INTEGRATION_RESULT: ${{ needs.business-critical-integration.result }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          NOTIFY_ONLY: ${{ github.event.inputs.notify_only || 'false' }}
          EXTRA_MESSAGE: ${{ github.event.inputs.notification_message || '' }}
        run: |
          set -u

          WEBHOOK_URL="$(echo -n "${WEBHOOK_URL:-}" | tr -d '\r\n')"
          if [ -z "${WEBHOOK_URL}" ]; then
            echo "::error::WHATSAPP_WEBHOOK_URL is empty or missing."
            exit 1
          fi

          OVERALL_RESULT="success"
          if [ "${PROD_RESULT}" != "success" ] || [ "${INTEGRATION_RESULT}" != "success" ]; then
            OVERALL_RESULT="failure"
          fi

          format_job_status() {
            case "$1" in
              success) echo "✅ $2 OK" ;;
              cancelled) echo "⚠️ $2 CANCELLED" ;;
              *) echo "❌ $2 FAIL" ;;
            esac
          }

          PROD_LINE="$(format_job_status "${PROD_RESULT}" "Prod")"
          INTEGRATION_LINE="$(format_job_status "${INTEGRATION_RESULT}" "Integration")"

          case "${OVERALL_RESULT}" in
            success) ICON="✅" ;;
            cancelled) ICON="⚠️" ;;
            *) ICON="❌" ;;
          esac

          if [ "${NOTIFY_ONLY}" = "true" ]; then
            MSG="🧪 DocCy PROD manual WhatsApp test | run ${RUN_ID}"
          else
            MSG="${ICON} DocCy nightly | ${PROD_LINE} | ${INTEGRATION_LINE} | run ${RUN_ID}"
          fi
          if [ -n "${EXTRA_MESSAGE}" ]; then
            MSG="${MSG} | ${EXTRA_MESSAGE}"
          fi

          attempt=1
          max_attempts=3
          while [ "${attempt}" -le "${max_attempts}" ]; do
            echo "WhatsApp attempt ${attempt}/${max_attempts}"
            # Legacy secrets may already include text= in query. Remove it and send our own text always.
            SEND_URL="$(printf '%s' "${WEBHOOK_URL}" | sed -E 's/([?&])text=[^&]*(&|$)/\1\2/g' | sed -E 's/\?&/\?/g; s/&&/&/g; s/[?&]$//')"
            if curl -fsS --max-time 20 -G "${SEND_URL}" --data-urlencode "text=${MSG}"; then
              echo "sent=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep $((attempt * 5))
            attempt=$((attempt + 1))
          done

          echo "::error::WhatsApp delivery failed after ${max_attempts} attempts."
          echo "sent=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Open issue if WhatsApp notification failed
        if: steps.whatsapp.outcome != 'success'
        uses: actions/github-script@v7
        env:
          PROD_RESULT: ${{ needs.prod-critical-smoke.result }}
          INTEGRATION_RESULT: ${{ needs.business-critical-integration.result }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const title = `[prod-monitoring] WhatsApp notification failed (run ${process.env.RUN_ID})`;
            const body = [
              "WhatsApp delivery failed after retries.",
              "",
              `Prod result: **${process.env.PROD_RESULT}**`,
              `Business-critical integration result: **${process.env.INTEGRATION_RESULT}**`,
              `Run: ${process.env.RUN_URL}`,
              "",
              "Action required:",
              "- Verify `WHATSAPP_WEBHOOK_URL` repository secret.",
              "- Validate webhook provider health and recipient setup."
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["ci", "monitoring"]
            });

      - name: Fail workflow if WhatsApp notification failed
        if: steps.whatsapp.outcome != 'success'
        shell: bash
        run: |
          echo "::error::WhatsApp notification failed. Issue created."
          exit 1
