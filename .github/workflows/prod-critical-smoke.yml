# Nightly prod browser smoke: tests/prod/*
# Covers: public shell (home, login, register), guest booking + cleanup, doctor login → agenda,
# optional full registration when PLAYWRIGHT_LIVE_REGISTRATION=1.
# Not covered here (local / integration only): agenda cancel flows, confirm/decline REQUESTED,
# reschedule token pages, race-condition DB test (see pr-integration.yml).

name: Production Monitoring

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC. 03:00 UTC ≈ 05:00 Asia/Nicosia (EET, UTC+2).
    - cron: "0 3 * * *"

permissions:
  contents: read
  issues: write

jobs:
  prod-critical-smoke:
    runs-on: ubuntu-latest
    # Cold runs: npm ci + playwright --with-deps (apt + fonts) + prod suite can exceed 30m.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        # --with-deps runs apt (fonts, libs). First run often takes several minutes; this is normal.
        run: npx playwright install --with-deps chromium

      - name: Run production critical smoke suite
        env:
          PLAYWRIGHT_LIVE_REGISTRATION: "1"
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL_PROD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_DOCTOR_EMAIL: ${{ secrets.TEST_DOCTOR_EMAIL }}
          TEST_DOCTOR_PASSWORD: ${{ secrets.TEST_DOCTOR_PASSWORD }}
          TEST_BOOKING_DOCTOR_SLUG: ${{ secrets.TEST_BOOKING_DOCTOR_SLUG }}
        run: npx playwright test tests/prod/ --project="Desktop Large (Chromium)" --reporter=line

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-prod-monitoring-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Send WhatsApp monitoring status
        if: always()
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.WHATSAPP_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            echo "No WHATSAPP_WEBHOOK_URL configured. Skipping WhatsApp notification."
            exit 0
          fi
          WEBHOOK_URL="$(echo -n "${WEBHOOK_URL}" | tr -d '\r\n')"
          if [ "${JOB_STATUS}" = "success" ]; then
            MSG='✅ DocCy PROD: Success'
          else
            MSG='❌ DocCy PROD: Failure'
          fi
          if [[ "${WEBHOOK_URL}" == *"text="* ]]; then
            curl -fsS "${WEBHOOK_URL}" || {
              echo "::warning::Legacy webhook URL with text= failed."
              exit 1
            }
          else
            curl -fsS -G "${WEBHOOK_URL}" --data-urlencode "text=${MSG}" || {
              echo "::warning::WhatsApp webhook delivery failed."
              exit 1
            }
          fi
