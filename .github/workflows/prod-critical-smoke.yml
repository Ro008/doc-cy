# Nightly prod browser smoke: tests/prod/*
# Covers: public shell (home, login, register), guest booking + cleanup, doctor login → agenda,
# optional full registration when PLAYWRIGHT_LIVE_REGISTRATION=1.
# Not covered here (local / integration only): agenda cancel flows, confirm/decline REQUESTED,
# reschedule token pages, race-condition DB test (see pr-integration.yml).

name: Production Monitoring

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC. 03:00 UTC = 05:00 in Asia/Nicosia during EET (UTC+2).
    - cron: "0 3 * * *"

permissions:
  contents: read
  issues: write

jobs:
  prod-critical-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute Cyprus hour and schedule window
        id: cyprus
        shell: bash
        run: |
          hour="$(TZ=Asia/Nicosia date +%H)"
          echo "hour=${hour}" >> "$GITHUB_OUTPUT"
          echo "now=$(TZ=Asia/Nicosia date '+%Y-%m-%d %H:%M:%S %Z')" >> "$GITHUB_OUTPUT"
          if [ "${hour}" = "05" ] || [ "${hour}" = "06" ]; then
            echo "in_schedule_window=true" >> "$GITHUB_OUTPUT"
          else
            echo "in_schedule_window=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip outside 05:00–07:00 Cyprus window
        if: github.event_name == 'schedule' && steps.cyprus.outputs.in_schedule_window != 'true'
        shell: bash
        run: |
          echo "Skipping scheduled prod-critical-smoke: current time is outside the allowed window."
          echo "Allowed window: 05:00–07:00 Asia/Nicosia (EET/EEST). Now: ${{ steps.cyprus.outputs.now }} (local hour ${{ steps.cyprus.outputs.hour }})."

      - name: Setup Node
        if: github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.in_schedule_window == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.in_schedule_window == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.in_schedule_window == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run production critical smoke suite
        if: github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.in_schedule_window == 'true'
        env:
          PLAYWRIGHT_LIVE_REGISTRATION: "1"
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL_PROD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_DOCTOR_EMAIL: ${{ secrets.TEST_DOCTOR_EMAIL }}
          TEST_DOCTOR_PASSWORD: ${{ secrets.TEST_DOCTOR_PASSWORD }}
          TEST_BOOKING_DOCTOR_SLUG: ${{ secrets.TEST_BOOKING_DOCTOR_SLUG }}
        run: npx playwright test tests/prod/ --project="Desktop Large (Chromium)" --reporter=line

      - name: Upload Playwright report
        if: always() && (github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.in_schedule_window == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: playwright-prod-monitoring-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Send WhatsApp monitoring status
        if: always() && (github.event_name == 'workflow_dispatch' || steps.cyprus.outputs.in_schedule_window == 'true')
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.WHATSAPP_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            echo "No WHATSAPP_WEBHOOK_URL configured. Skipping WhatsApp notification."
            exit 0
          fi
          WEBHOOK_URL="$(echo -n "${WEBHOOK_URL}" | tr -d '\r\n')"
          if [ "${JOB_STATUS}" = "success" ]; then
            MSG='✅ DocCy PROD: Success'
          else
            MSG='❌ DocCy PROD: Failure'
          fi
          # Robust delivery: accept either a full webhook URL or one with existing query params.
          # We always append `text` via --data-urlencode to avoid format-sensitive secrets.
          if [[ "${WEBHOOK_URL}" == *"text="* ]]; then
            # If secret already contains text=..., use as-is (legacy format).
            curl -fsS "${WEBHOOK_URL}" || {
              echo "::warning::Legacy webhook URL with text= failed."
              exit 1
            }
          else
            curl -fsS -G "${WEBHOOK_URL}" --data-urlencode "text=${MSG}" || {
              echo "::warning::WhatsApp webhook delivery failed."
              exit 1
            }
          fi
