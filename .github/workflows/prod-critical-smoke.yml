# Nightly prod browser smoke: tests/prod/*
# Covers: public shell (home, login, register), guest booking + cleanup, doctor login → agenda,
# optional full registration when PLAYWRIGHT_LIVE_REGISTRATION=1.
# Not covered here (local / integration only): agenda cancel flows, confirm/decline REQUESTED,
# reschedule token pages, race-condition DB test (see pr-integration.yml).

name: Production Monitoring

on:
  workflow_dispatch:
    inputs:
      notify_only:
        description: "Send only WhatsApp notification (skip smoke tests)"
        required: false
        default: false
        type: boolean
      notification_message:
        description: "Optional extra text appended to WhatsApp message"
        required: false
        default: ""
        type: string
  schedule:
    # GitHub Actions cron is UTC. 03:00 UTC ≈ 05:00 Asia/Nicosia (EET, UTC+2).
    - cron: "0 3 * * *"

permissions:
  contents: read
  issues: write

jobs:
  prod-critical-smoke:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.notify_only != 'true' }}
    runs-on: ubuntu-latest
    # Cold runs: npm ci + playwright --with-deps (apt + fonts) + prod suite can exceed 30m.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        # --with-deps runs apt (fonts, libs). First run often takes several minutes; this is normal.
        run: npx playwright install --with-deps chromium

      - name: Validate Supabase production secrets
        shell: bash
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PROD_NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          INTEGRATION_SUPABASE_URL: ${{ secrets.INTEGRATION_SUPABASE_URL }}
        run: |
          set -euo pipefail
          missing=0

          if [ -z "${NEXT_PUBLIC_SUPABASE_URL}" ]; then
            echo "::error::Missing GitHub secret NEXT_PUBLIC_SUPABASE_URL."
            missing=1
          fi
          if [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ]; then
            echo "::error::Missing GitHub secret NEXT_PUBLIC_SUPABASE_ANON_KEY (or fallback SUPABASE_ANON_KEY)."
            missing=1
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "::error::Missing GitHub secret SUPABASE_SERVICE_ROLE_KEY."
            missing=1
          fi

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          normalize_url() { echo "$1" | sed 's:/*$::'; }
          prod_norm="$(normalize_url "${NEXT_PUBLIC_SUPABASE_URL}")"
          expected_prod_norm="$(normalize_url "${PROD_NEXT_PUBLIC_SUPABASE_URL:-}")"
          integration_norm="$(normalize_url "${INTEGRATION_SUPABASE_URL:-}")"

          # If an explicit production URL secret is configured, force exact match.
          if [ -n "${expected_prod_norm}" ] && [ "${prod_norm}" != "${expected_prod_norm}" ]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_URL does not match PROD_NEXT_PUBLIC_SUPABASE_URL. Refusing to run prod monitoring against a non-prod Supabase project."
            exit 1
          fi

          # Guardrail: never run prod monitoring against integration/testing Supabase.
          if [ -n "${integration_norm}" ] && [ "${prod_norm}" = "${integration_norm}" ]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_URL matches INTEGRATION_SUPABASE_URL. Refusing to run prod monitoring against integration/testing Supabase."
            exit 1
          fi

      - name: Run reschedule email guards
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DOC_CY_SUPPRESS_TRAFFIC_LOG_SECRET: ${{ secrets.DOC_CY_SUPPRESS_TRAFFIC_LOG_SECRET }}
        run: |
          npx playwright test \
            tests/integration/agenda_multisession_sync.integration.spec.ts \
            tests/integration/trial_period_logic.integration.spec.ts \
            tests/integration/agenda_visit_reason.integration.spec.ts \
            tests/integration/reschedule_email_content.integration.spec.ts \
            --project="Desktop Large (Chromium)" \
            --workers=1 \
            --reporter=line

      - name: Validate production base URL target
        shell: bash
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL_PROD }}
          PROD_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          set -euo pipefail

          normalize_url() { echo "$1" | sed 's:/*$::'; }

          if [ -z "${PLAYWRIGHT_BASE_URL:-}" ]; then
            echo "::error::Missing GitHub secret PLAYWRIGHT_BASE_URL_PROD."
            exit 1
          fi

          base_norm="$(normalize_url "${PLAYWRIGHT_BASE_URL}")"
          expected_site="${PROD_SITE_URL:-https://www.mydoccy.com}"
          expected_norm="$(normalize_url "${expected_site}")"

          base_host="$(echo "${base_norm}" | sed -E 's#^https?://([^/:]+).*#\1#')"
          expected_host="$(echo "${expected_norm}" | sed -E 's#^https?://([^/:]+).*#\1#')"

          if [ "${base_host}" != "${expected_host}" ]; then
            echo "::error::PLAYWRIGHT_BASE_URL_PROD host (${base_host}) does not match production host (${expected_host})."
            echo "::error::Set PLAYWRIGHT_BASE_URL_PROD to the same production site you use manually."
            exit 1
          fi

          case "${base_host}" in
            *vercel.app)
              echo "::error::PLAYWRIGHT_BASE_URL_PROD points to a vercel.app host (${base_host}). Use the canonical production domain instead."
              exit 1
              ;;
          esac

      - name: Run production critical smoke suite
        env:
          PLAYWRIGHT_LIVE_REGISTRATION: "1"
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL_PROD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DOC_CY_SUPPRESS_TRAFFIC_LOG_SECRET: ${{ secrets.DOC_CY_SUPPRESS_TRAFFIC_LOG_SECRET }}
          TEST_DOCTOR_EMAIL: ${{ secrets.TEST_DOCTOR_EMAIL }}
          TEST_DOCTOR_PASSWORD: ${{ secrets.TEST_DOCTOR_PASSWORD }}
          TEST_BOOKING_DOCTOR_SLUG: ${{ secrets.TEST_BOOKING_DOCTOR_SLUG }}
        run: npx playwright test tests/prod/ --project="Desktop Large (Chromium)" --reporter=line

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-prod-monitoring-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  notify-whatsapp:
    if: always()
    needs: [prod-critical-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Send WhatsApp monitoring status (retries)
        id: whatsapp
        continue-on-error: true
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.WHATSAPP_WEBHOOK_URL }}
          SMOKE_RESULT: ${{ needs.prod-critical-smoke.result }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          NOTIFY_ONLY: ${{ github.event.inputs.notify_only || 'false' }}
          EXTRA_MESSAGE: ${{ github.event.inputs.notification_message || '' }}
        run: |
          set -u

          WEBHOOK_URL="$(echo -n "${WEBHOOK_URL:-}" | tr -d '\r\n')"
          if [ -z "${WEBHOOK_URL}" ]; then
            echo "::error::WHATSAPP_WEBHOOK_URL is empty or missing."
            exit 1
          fi

          case "${SMOKE_RESULT}" in
            success) ICON="✅" ;;
            cancelled) ICON="⚠️" ;;
            *) ICON="❌" ;;
          esac

          if [ "${NOTIFY_ONLY}" = "true" ]; then
            MSG="🧪 DocCy PROD manual WhatsApp test | run ${RUN_ID}"
          else
            MSG="${ICON} DocCy PROD (${SMOKE_RESULT}) | run ${RUN_ID}"
          fi
          if [ -n "${EXTRA_MESSAGE}" ]; then
            MSG="${MSG} | ${EXTRA_MESSAGE}"
          fi

          attempt=1
          max_attempts=3
          while [ "${attempt}" -le "${max_attempts}" ]; do
            echo "WhatsApp attempt ${attempt}/${max_attempts}"
            # Legacy secrets may already include text= in query. Remove it and send our own text always.
            SEND_URL="$(printf '%s' "${WEBHOOK_URL}" | sed -E 's/([?&])text=[^&]*(&|$)/\1\2/g' | sed -E 's/\?&/\?/g; s/&&/&/g; s/[?&]$//')"
            if curl -fsS --max-time 20 -G "${SEND_URL}" --data-urlencode "text=${MSG}"; then
              echo "sent=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep $((attempt * 5))
            attempt=$((attempt + 1))
          done

          echo "::error::WhatsApp delivery failed after ${max_attempts} attempts."
          echo "sent=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Open issue if WhatsApp notification failed
        if: steps.whatsapp.outcome != 'success'
        uses: actions/github-script@v7
        env:
          SMOKE_RESULT: ${{ needs.prod-critical-smoke.result }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const title = `[prod-monitoring] WhatsApp notification failed (run ${process.env.RUN_ID})`;
            const body = [
              "WhatsApp delivery failed after retries.",
              "",
              `Smoke result: **${process.env.SMOKE_RESULT}**`,
              `Run: ${process.env.RUN_URL}`,
              "",
              "Action required:",
              "- Verify `WHATSAPP_WEBHOOK_URL` repository secret.",
              "- Validate webhook provider health and recipient setup."
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["ci", "monitoring"]
            });

      - name: Fail workflow if WhatsApp notification failed
        if: steps.whatsapp.outcome != 'success'
        shell: bash
        run: |
          echo "::error::WhatsApp notification failed. Issue created."
          exit 1
