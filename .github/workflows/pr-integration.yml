name: PR Integration Tests

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-safe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Hard guard used by integration specs to avoid production execution.
      INTEGRATION_SAFE_ENV: "1"
      # Map repository secrets → names the app and Playwright tests expect.
      PLAYWRIGHT_BASE_URL: "${{ secrets.INTEGRATION_BASE_URL }}"
      NEXT_PUBLIC_SUPABASE_URL: "${{ secrets.INTEGRATION_SUPABASE_URL }}"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "${{ secrets.INTEGRATION_SUPABASE_ANON_KEY }}"
      SUPABASE_SERVICE_ROLE_KEY: "${{ secrets.INTEGRATION_SUPABASE_SERVICE_ROLE_KEY }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate isolated environment configuration
        shell: bash
        env:
          PLAYWRIGHT_BASE_URL: "${{ secrets.INTEGRATION_BASE_URL }}"
          NEXT_PUBLIC_SUPABASE_URL: "${{ secrets.INTEGRATION_SUPABASE_URL }}"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "${{ secrets.INTEGRATION_SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_ROLE_KEY: "${{ secrets.INTEGRATION_SUPABASE_SERVICE_ROLE_KEY }}"
        run: |
          set -euo pipefail
          missing=0

          if [ -z "${PLAYWRIGHT_BASE_URL}" ]; then
            echo "::error::Missing GitHub secret INTEGRATION_BASE_URL (env PLAYWRIGHT_BASE_URL is empty)."
            missing=1
          fi
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL}" ]; then
            echo "::error::Missing GitHub secret INTEGRATION_SUPABASE_URL (env NEXT_PUBLIC_SUPABASE_URL is empty)."
            missing=1
          fi
          if [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ]; then
            echo "::error::Missing GitHub secret INTEGRATION_SUPABASE_ANON_KEY (env NEXT_PUBLIC_SUPABASE_ANON_KEY is empty)."
            missing=1
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "::error::Missing GitHub secret INTEGRATION_SUPABASE_SERVICE_ROLE_KEY (env SUPABASE_SERVICE_ROLE_KEY is empty)."
            missing=1
          fi

          if [ "${missing}" -ne 0 ]; then
            echo "Add the INTEGRATION_* secrets in Repo Settings → Secrets and variables → Actions."
            if [ "${GITHUB_EVENT_NAME:-}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
              echo "This PR is from a fork; GitHub does not inject repository secrets into fork PR workflows. Use a branch on this repo or workflow_dispatch."
            fi
            exit 1
          fi

          if echo "${PLAYWRIGHT_BASE_URL}" | grep -Eqi 'mydoccy\.com|vercel\.app'; then
            echo "Unsafe PLAYWRIGHT_BASE_URL points to production. Aborting."
            exit 1
          fi
          if echo "${NEXT_PUBLIC_SUPABASE_URL}" | grep -Eqi 'supabase\.co'; then
            echo "Unsafe NEXT_PUBLIC_SUPABASE_URL points to hosted/prod Supabase. Aborting."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run race-condition integration test (safe env only)
        env:
          INTEGRATION_SAFE_ENV: "1"
          PLAYWRIGHT_BASE_URL: "${{ secrets.INTEGRATION_BASE_URL }}"
          NEXT_PUBLIC_SUPABASE_URL: "${{ secrets.INTEGRATION_SUPABASE_URL }}"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "${{ secrets.INTEGRATION_SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_ROLE_KEY: "${{ secrets.INTEGRATION_SUPABASE_SERVICE_ROLE_KEY }}"
        run: npx playwright test tests/integration/appointments_race_condition.integration.spec.ts --project="Desktop Large (Chromium)" --reporter=line
