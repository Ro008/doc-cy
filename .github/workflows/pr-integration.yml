# PR gatekeeper: exercises this branch's Next.js build + isolated Supabase, and (same-repo PRs)
# Vercel Preview HTML shell. Required checks: configure branch protection for job names below.
#
# Secrets: INTEGRATION_SUPABASE_URL, INTEGRATION_SUPABASE_ANON_KEY,
#          INTEGRATION_SUPABASE_SERVICE_ROLE_KEY, PROD_NEXT_PUBLIC_SUPABASE_URL (production URL only;
#          used to refuse running integration tests against prod Supabase).
# Optional repo variable: INTEGRATION_SCHEDULE_TEST_DOCTOR_SLUG (default andreas-nikos) for schedule_constraints.
# Optional legacy: INTEGRATION_BASE_URL — not required when building locally in CI.

name: PR Integration Tests

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: pr-integration-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-playwright-core:
    name: PR Playwright (core business)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      INTEGRATION_SAFE_ENV: "1"
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_WEB_SERVER_COMMAND: npm run start
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.INTEGRATION_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.INTEGRATION_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.INTEGRATION_SUPABASE_SERVICE_ROLE_KEY }}
      PROD_NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      INTEGRATION_SCHEDULE_TEST_DOCTOR_SLUG: ${{ vars.INTEGRATION_SCHEDULE_TEST_DOCTOR_SLUG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate isolated Supabase configuration
        shell: bash
        env:
          NEXT_PUBLIC_SUPABASE_URL: "${{ secrets.INTEGRATION_SUPABASE_URL }}"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "${{ secrets.INTEGRATION_SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_ROLE_KEY: "${{ secrets.INTEGRATION_SUPABASE_SERVICE_ROLE_KEY }}"
          PROD_NEXT_PUBLIC_SUPABASE_URL: "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
        run: |
          set -euo pipefail
          missing=0

          if [ -z "${NEXT_PUBLIC_SUPABASE_URL}" ]; then
            echo "::error::Missing GitHub secret INTEGRATION_SUPABASE_URL."
            missing=1
          fi
          if [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ]; then
            echo "::error::Missing GitHub secret INTEGRATION_SUPABASE_ANON_KEY."
            missing=1
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "::error::Missing GitHub secret INTEGRATION_SUPABASE_SERVICE_ROLE_KEY."
            missing=1
          fi

          if [ "${missing}" -ne 0 ]; then
            echo "Add the INTEGRATION_* secrets in Repo Settings → Secrets and variables → Actions."
            if [ "${GITHUB_EVENT_NAME:-}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
              echo "This PR is from a fork; GitHub does not inject repository secrets into fork PR workflows."
            fi
            exit 1
          fi

          normalize_url() { echo "$1" | sed 's:/*$::'; }

          integration_norm="$(normalize_url "${NEXT_PUBLIC_SUPABASE_URL}")"
          prod_norm="$(normalize_url "${PROD_NEXT_PUBLIC_SUPABASE_URL:-}")"

          if echo "${integration_norm}" | grep -Eqi '\.supabase\.co'; then
            if [ -n "${prod_norm}" ] && [ "${integration_norm}" = "${prod_norm}" ]; then
              echo "Unsafe NEXT_PUBLIC_SUPABASE_URL matches production Supabase URL. Aborting."
              exit 1
            fi
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (PR branch)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.INTEGRATION_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.INTEGRATION_SUPABASE_ANON_KEY }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run critical Playwright suite
        env:
          CI: "true"
          INTEGRATION_SAFE_ENV: "1"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_WEB_SERVER_COMMAND: npm run start
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.INTEGRATION_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.INTEGRATION_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.INTEGRATION_SUPABASE_SERVICE_ROLE_KEY }}
          PROD_NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          INTEGRATION_SCHEDULE_TEST_DOCTOR_SLUG: ${{ vars.INTEGRATION_SCHEDULE_TEST_DOCTOR_SLUG }}
        run: |
          npx playwright test \
            tests/integration/appointments_race_condition.integration.spec.ts \
            tests/integration/needs_reschedule_slot_free.integration.spec.ts \
            tests/schedule_constraints.spec.ts \
            tests/booking_flow.spec.ts \
            --project="Desktop Large (Chromium)" \
            --reporter=line

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-pr-core-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  pr-feedback-smoke:
    name: PR Playwright (feedback smoke)
    needs: [pr-playwright-core]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      INTEGRATION_SAFE_ENV: "1"
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_WEB_SERVER_COMMAND: npm run start
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.INTEGRATION_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.INTEGRATION_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.INTEGRATION_SUPABASE_SERVICE_ROLE_KEY }}
      PROD_NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      INTEGRATION_SCHEDULE_TEST_DOCTOR_SLUG: ${{ vars.INTEGRATION_SCHEDULE_TEST_DOCTOR_SLUG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate feedback smoke credentials
        shell: bash
        env:
          INTEGRATION_TEST_USER_EMAIL: ${{ secrets.INTEGRATION_TEST_USER_EMAIL }}
          INTEGRATION_TEST_USER_PASSWORD: ${{ secrets.INTEGRATION_TEST_USER_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${INTEGRATION_TEST_USER_EMAIL:-}" ] || [ -z "${INTEGRATION_TEST_USER_PASSWORD:-}" ]; then
            echo "::error::Missing INTEGRATION_TEST_USER_EMAIL / INTEGRATION_TEST_USER_PASSWORD."
            exit 1
          fi
          sanitize() {
            local value="$1"
            value="$(printf '%s' "$value" | tr -d '\r\n')"
            value="${value%\"}"
            value="${value#\"}"
            value="${value%\'}"
            value="${value#\'}"
            printf '%s' "$value"
          }
          SANITIZED_EMAIL="$(sanitize "${INTEGRATION_TEST_USER_EMAIL}")"
          SANITIZED_PASSWORD="$(sanitize "${INTEGRATION_TEST_USER_PASSWORD}")"
          if [ -z "${SANITIZED_EMAIL}" ] || [ -z "${SANITIZED_PASSWORD}" ]; then
            echo "::error::Integration feedback credentials became empty after sanitization."
            exit 1
          fi
          echo "TEST_USER_EMAIL=${SANITIZED_EMAIL}" >> "$GITHUB_ENV"
          echo "TEST_USER_PASSWORD=${SANITIZED_PASSWORD}" >> "$GITHUB_ENV"

      - name: Build Next.js (PR branch)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.INTEGRATION_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.INTEGRATION_SUPABASE_ANON_KEY }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run feedback smoke suite (PR-fast)
        if: github.event_name == 'pull_request'
        env:
          CI: "true"
          INTEGRATION_SAFE_ENV: "1"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_WEB_SERVER_COMMAND: npm run start
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.INTEGRATION_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.INTEGRATION_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.INTEGRATION_SUPABASE_SERVICE_ROLE_KEY }}
          PROD_NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          INTEGRATION_SCHEDULE_TEST_DOCTOR_SLUG: ${{ vars.INTEGRATION_SCHEDULE_TEST_DOCTOR_SLUG }}
        run: |
          npx playwright test tests/feedback_matrix.spec.ts \
            --grep "doctor confirm success|doctor confirm error|agenda decline requested|agenda cancel confirmed" \
            --workers=1 \
            --project="Desktop Large (Chromium)" \
            --reporter=line

      - name: Run full feedback matrix (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          CI: "true"
          INTEGRATION_SAFE_ENV: "1"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_WEB_SERVER_COMMAND: npm run start
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.INTEGRATION_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.INTEGRATION_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.INTEGRATION_SUPABASE_SERVICE_ROLE_KEY }}
          PROD_NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          INTEGRATION_SCHEDULE_TEST_DOCTOR_SLUG: ${{ vars.INTEGRATION_SCHEDULE_TEST_DOCTOR_SLUG }}
        run: |
          npx playwright test tests/feedback_matrix.spec.ts \
            --workers=1 \
            --project="Desktop Large (Chromium)" \
            --reporter=line

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-pr-feedback-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  pr-preview-public-shell:
    name: PR Preview site health (Vercel)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
      deployments: read

    steps:
      - name: Fork PR — skip Vercel preview
        id: fork
        shell: bash
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Fork PR: skipping Vercel preview smoke (no deployment on this repo)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for Vercel Preview
        if: steps.fork.outputs.skip == 'false'
        id: vercel
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600

      - name: Checkout
        if: steps.fork.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.fork.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (Playwright only)
        if: steps.fork.outputs.skip == 'false'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.fork.outputs.skip == 'false'
        run: npx playwright install --with-deps chromium

      - name: Run public shell tests against Preview URL
        if: steps.fork.outputs.skip == 'false'
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.vercel.outputs.url }}
          PLAYWRIGHT_PREVIEW_SMOKE: "1"
          CI: "true"
        run: |
          npx playwright test tests/prod/prod_site_availability.spec.ts \
            --project="Desktop Large (Chromium)" \
            --reporter=line

      - name: Fork skip notice
        if: steps.fork.outputs.skip == 'true'
        run: echo "OK — Vercel preview job skipped (fork PR)."
